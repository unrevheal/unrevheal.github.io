<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour | UNREVHEAL</title>
    <!-- Copiamo lo stesso identico CSS di prima per coerenza -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #0a0a0a; --text-color: #eeeeee; --accent-color: #ff4500; --card-bg: #141414; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Impact', 'Arial Black', sans-serif; letter-spacing: 1px; line-height: 1.6; }
        h1, h2, h3 { text-transform: uppercase; color: #fff; }
        p, li { font-family: 'Arial', sans-serif; color: #b3b3b3; }
        a { color: var(--accent-color); text-decoration: none; transition: 0.3s; }
        a:hover { color: #fff; }
        header { background-color: rgba(10, 10, 10, 0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 2px solid var(--accent-color); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #fff; }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 20px; }
        nav ul li a { font-size: 1.1rem; text-transform: uppercase; }
        nav ul li a.active { color: #fff; border-bottom: 2px solid var(--accent-color); }
        section { padding: 140px 20px 60px 20px; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
        .section-title { font-size: 2.5rem; margin-bottom: 40px; border-left: 5px solid var(--accent-color); padding-left: 15px; }
        .btn { background-color: var(--accent-color); color: #fff; padding: 8px 20px; font-size: 1rem; text-transform: uppercase; font-weight: bold; border: none; cursor: pointer; box-shadow: 3px 3px 0px #fff; display: inline-block; }
        .btn:hover { background-color: #fff; color: var(--bg-color); box-shadow: 3px 3px 0px var(--accent-color); }
        footer { text-align: center; padding: 40px; color: #555; font-size: 0.8rem; font-family: sans-serif; }
        
        /* Specifico Tour */
        .tour-list { list-style: none; }
        .tour-item { background-color: var(--card-bg); padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #333; }
        .tour-item:hover { border-left-color: var(--accent-color); background-color: #1a1a1a; }
        .tour-date { font-weight: bold; color: var(--accent-color); min-width: 120px; }
        @media (max-width: 768px) { .nav-container { flex-direction: column; } nav ul { margin-top: 15px; } .tour-item { flex-direction: column; text-align: center; gap: 10px; } }
    </style>
</head>
<body>

                </ul>
            </nav>
        </div>
    </header>

    <section>
        <h2 class="section-title">Prossimi Live</h2>
        <ul class="tour-list">
            <li class="tour-item">
                <div class="tour-date">18 LUG 2026</div>
                <div><strong>LZO Metal Fest</strong> @ LZO - Conegliano (TV)</div>
                <!--<a href="#" class="btn" style="padding: 5px 15px; font-size: 0.9rem;">Tickets</a>-->
            </li>
            <li class="tour-item">
                <div class="tour-date">29 GEN 2027</div>

                <!--<a href="#" class="btn" style="padding: 5px 15px; font-size: 0.9rem;">Tickets</a>-->
            </li>

                <!--<a href="#" class="btn" style="padding: 5px 15px; font-size: 0.9rem;">Tickets</a>-->
            </li>
        </ul>
    </section>
    <footer>&copy; 2026 UNREVHEAL. DIY OR DIE.</footer>
</body>
</html>
